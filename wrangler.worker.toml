name = "my-opticplan"
main = "worker/index.js"
compatibility_date = "2026-05-09"
workers_dev = true
routes = [
  { pattern = "opticplan.space/*", zone_name = "opticplan.space" },
  { pattern = "www.opticplan.space/*", zone_name = "opticplan.space" }
]

[vars]
POLAR_API_BASE = "https://api.polar.sh"
POLAR_ENV = "live"

[assets]
directory = "./dist"
binding = "SITE_ASSETS"
not_found_handling = "single-page-application"
run_worker_first = [
  "/*"
]

[[d1_databases]]
binding = "DB"
# Shared production analytics D1. Rows are isolated by site_key.
database_name = "openclaw-launch"
database_id = "5c31068a-d85a-4c83-9efe-01e2de1ad22b"
